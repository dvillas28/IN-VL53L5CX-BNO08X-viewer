; PlatformIO project config for VL53L5CX + BNO08X ESP32 reader
; Docs: https://docs.platformio.org/page/projectconf.html
;
; Build:    pio run
; Upload:   pio run -t upload
; Monitor:  pio device monitor

[platformio]
; Compile the existing Arduino sketch in firmware/vl53l5cx_reader/
src_dir = vl53l5cx_reader

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial settings (matches firmware Serial.begin and viewer default baud)
monitor_speed = 115200
upload_speed = 921600

; Fixed port for this machine (ESP32 enumerates as /dev/ttyUSB0).
; Comment these out to let PlatformIO auto-detect the port.
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0

; Sensor libraries (same as the arduino-cli names in the README)
lib_deps =
    sparkfun/SparkFun VL53L5CX Arduino Library
    sparkfun/SparkFun BNO08x Cortex Based IMU
